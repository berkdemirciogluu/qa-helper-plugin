<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="128" height="64" rx="24" fill="url(#shine)"/>

  <!-- Bug body -->
  <ellipse cx="64" cy="79" rx="22" ry="27" fill="#ffffff" opacity="0.95"/>

  <!-- Bug head -->
  <circle cx="64" cy="49" r="13" fill="#ffffff" opacity="0.95"/>

  <!-- Eyes -->
  <circle cx="58.5" cy="47" r="3" fill="#4f46e5"/>
  <circle cx="69.5" cy="47" r="3" fill="#4f46e5"/>

  <!-- Antennae -->
  <line x1="57" y1="38" x2="47" y2="24" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="71" y1="38" x2="81" y2="24" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
  <circle cx="47" cy="24" r="4.5" fill="#a5b4fc"/>
  <circle cx="81" cy="24" r="4.5" fill="#a5b4fc"/>

  <!-- Legs left -->
  <line x1="42" y1="67" x2="26" y2="60" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <line x1="42" y1="79" x2="26" y2="79" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <line x1="42" y1="91" x2="26" y2="98" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.85"/>

  <!-- Legs right -->
  <line x1="86" y1="67" x2="102" y2="60" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <line x1="86" y1="79" x2="102" y2="79" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <line x1="86" y1="91" x2="102" y2="98" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.85"/>

  <!-- Body center line -->
  <line x1="64" y1="53" x2="64" y2="104" stroke="#818cf8" stroke-width="2" stroke-dasharray="4 3" opacity="0.7"/>

  <!-- Recording dot background (shadow) -->
  <circle cx="98" cy="30" r="13" fill="#000000" opacity="0.2"/>
  <!-- Recording dot -->
  <circle cx="98" cy="30" r="11" fill="#ef4444"/>
  <!-- Recording dot inner highlight -->
  <circle cx="95" cy="27" r="3.5" fill="#fca5a5" opacity="0.7"/>
</svg>
